name: Publish uploaded site files
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-upload.yml'
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move uploaded files into the site
        run: |
          cp -f github-upload/index.html index.html
          mkdir -p assets/images
          cp -f github-upload/assets/images/* assets/images/
          rm -rf github-upload
          rm -f .github/workflows/publish-upload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajout des photos Tour de France 2026 - etapes 6 et 7"
          git push
